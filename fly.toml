app = "pi-service"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.pi"

[env]
# Set these in Fly.io secret<REDACTED> not in the file
# DISPATCH_URL = "http://<dispatch-host>:8001"
# DISPATCH_SECRET = <REDACTED>

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20
